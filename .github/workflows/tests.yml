name: Testes com Kafka

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    # Define o Kafka como um serviço que roda ao lado do seu job
    services:
      kafka:
        image: apache/kafka:latest
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: rdkafka, mbstring, pdo_mysql

      - name: Install dependencies
        run: composer install --prefer-dist

      - name: Preparar ambiente de teste
        run: |
          mkdir -p database
          touch database/database.sqlite
          # Opcional: roda migrations se necessário
          php artisan migrate --force

      - name: Rodar Testes Feature
        env:
          KAFKA_BROKERS: 127.0.0.1:9092
          DB_CONNECTION: sqlite
          DB_DATABASE: database/database.sqlite
        run: php artisan test --testsuite=Feature
